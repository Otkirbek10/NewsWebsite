<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }}</title>
</head>
<body>
{% block content %}
    {{post.title}} <br>
    {{ post.body }}
    {% if post.image %}
    <img class="img-fluid" src="{{ post.image.url }}" alt="">
    {% endif %}
{% endblock %}
</body>
